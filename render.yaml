databases:
  - name: financetracker-db
    databaseName: finance_tracker
    plan: free

services:
  # 1. Backend Service (Docker)
  - type: web
    name: financetracker-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /v3/api-docs
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: financetracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: financetracker-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: financetracker-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: financetracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: financetracker-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # 2. Frontend Service (Static Site)
  - type: web
    name: financetracker-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: financetracker-backend
          property: host
        suffix: /api/v1
